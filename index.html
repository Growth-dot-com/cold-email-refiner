<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Refine — Cold Email Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F8FB;
    --surface: #FFFFFF;
    --border: #E5E8EF;
    --border-strong: #D3D8E3;
    --ink: #14171F;
    --ink-soft: #5C6270;
    --ink-muted: #9297A3;
    --accent: #3B5BFD;
    --accent-hover: #2E48D6;
    --accent-soft: #EBEFFF;
    --accent-text: #2440C7;
    --success: #0F9D6E;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 56px 24px 80px;
  }

  .wrap { max-width: 720px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 18px; height: 18px; }

  h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .tagline { font-size: 13px; color: var(--ink-soft); margin-top: 1px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 1px 2px rgba(20,23,31,0.04), 0 8px 24px rgba(20,23,31,0.03);
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    min-height: 170px;
    resize: vertical;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    line-height: 1.6;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  textarea::placeholder { color: var(--ink-muted); }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); background: var(--surface); }

  .controls {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .tone-group { flex: 1; min-width: 220px; }

  .tone-chips { display: flex; flex-wrap: wrap; gap: 8px; }

  .chip {
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--ink); }
  .chip.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  .send-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    padding: 13px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 1px 2px rgba(59,91,253,0.15), 0 4px 12px rgba(59,91,253,0.18);
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:active { transform: scale(0.98); }
  .send-btn:disabled { background: #A9B4F7; cursor: not-allowed; box-shadow: none; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .send-btn.loading .spinner { display: inline-block; }
  .send-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    overflow: hidden;
    display: none;
    box-shadow: 0 1px 2px rgba(20,23,31,0.04), 0 8px 24px rgba(20,23,31,0.03);
  }
  .result-card.show { display: block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .result-header .field-label { margin: 0; }

  .copy-btn {
    font-size: 12px;
    font-weight: 600;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--ink-soft);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent-text); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .result-body {
    padding: 20px;
    font-size: 14.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    color: var(--ink);
  }

  .notes {
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    background: var(--accent-soft);
  }
  .notes strong { color: var(--accent-text); }

  .error-box {
    margin-top: 16px;
    padding: 13px 16px;
    border: 1.5px solid #F3C6C6;
    border-radius: 10px;
    background: #FDEDED;
    color: #A32D2D;
    font-size: 13px;
    display: none;
  }
  .error-box.show { display: block; }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--ink-muted);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6L12 13L20 6" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 6H20V17C20 17.5523 19.5523 18 19 18H5C4.44772 18 4 17.5523 4 17V6Z" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <h1>Refine</h1>
      <div class="tagline">Turn a rough draft into a cold email worth opening</div>
    </div>
  </header>

  <div class="card">
    <div class="field-label">Your rough draft</div>
    <textarea id="draftInput" placeholder="Paste your rough cold email here. Don't worry about polish — just get the idea down.&#10;&#10;e.g. Hey, I saw your company does marketing for small businesses. I built a tool that could help you save time on client reports. Want to hop on a call sometime?"></textarea>

    <div class="controls">
      <div class="tone-group">
        <div class="field-label">Tone</div>
        <div class="tone-chips" id="toneChips">
          <div class="chip active" data-tone="Direct and confident">Direct</div>
          <div class="chip" data-tone="Warm and friendly">Friendly</div>
          <div class="chip" data-tone="Formal and professional">Formal</div>
          <div class="chip" data-tone="Founder-to-founder, casual peer tone">Founder-to-founder</div>
          <div class="chip" data-tone="Persuasive and benefit-driven, but not pushy">Persuasive</div>
        </div>
      </div>
      <button class="send-btn" id="refineBtn">
        <div class="spinner"></div>
        <span class="btn-text">Refine email →</span>
      </button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="field-label" style="margin:0;">Refined version</div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="notes" id="resultNotes"></div>
  </div>

  <footer>Built to test one idea — does AI-refined outreach actually save you time.</footer>
</div>

<script>
  let selectedTone = "Direct and confident";

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedTone = chip.dataset.tone;
    });
  });

  const btn = document.getElementById('refineBtn');
  const draftInput = document.getElementById('draftInput');
  const resultCard = document.getElementById('resultCard');
  const resultBody = document.getElementById('resultBody');
  const resultNotes = document.getElementById('resultNotes');
  const errorBox = document.getElementById('errorBox');
  const copyBtn = document.getElementById('copyBtn');

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(resultBody.textContent).then(() => {
      copyBtn.textContent = 'Copied';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
    });
  });

  btn.addEventListener('click', async () => {
    const draft = draftInput.value.trim();
    errorBox.classList.remove('show');
    if (!draft) {
      errorBox.textContent = 'Paste a draft email first — even a rough one is fine.';
      errorBox.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    resultCard.classList.remove('show');

    try {
      // Calls your own backend (api/refine.js) — it holds the API key, not this page.
      const response = await fetch("/api/refine", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ draft: draft, tone: selectedTone })
      });

      const parsed = await response.json();

      if (!response.ok) {
        throw new Error(parsed.error || "Request failed: " + response.status);
      }

      resultBody.textContent = parsed.refined_email || "(no output)";
      resultNotes.innerHTML = parsed.notes ? ("<strong>What changed: </strong>" + parsed.notes) : "";
      resultCard.classList.add('show');
    } catch (err) {
      console.error(err);
      errorBox.textContent = "Something went wrong refining that email. Please try again in a moment.";
      errorBox.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
