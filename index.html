<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Refine — Cold Email Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F3EA;
    --paper-line: #E4DCC8;
    --ink: #1E2A38;
    --ink-soft: #4B5A6B;
    --stamp: #B5461A;
    --stamp-soft: #E9D6C6;
    --seal-green: #3C5B47;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 2.1em;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 24px 80px;
  }

  .wrap {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--paper-line);
    padding-bottom: 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stamp-mark {
    width: 44px;
    height: 44px;
    border: 2px solid var(--stamp);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .stamp-mark::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px dashed var(--stamp);
    border-radius: 50%;
  }
  .stamp-mark span {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--stamp);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .tagline {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .postmark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-align: right;
    line-height: 1.6;
    border: 1px solid var(--paper-line);
    padding: 8px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  textarea {
    width: 100%;
    min-height: 190px;
    resize: vertical;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 16px;
    border: 1px solid var(--paper-line);
    border-radius: 6px;
    background: #FFFEFA;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--stamp); }

  .controls {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    margin: 24px 0;
    flex-wrap: wrap;
  }

  .tone-group { flex: 1; min-width: 220px; }

  .tone-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    border: 1px solid var(--paper-line);
    border-radius: 20px;
    background: #FFFEFA;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--stamp); color: var(--ink); }
  .chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .send-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px 26px;
    background: var(--stamp);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .send-btn:hover { background: #9a3a15; }
  .send-btn:active { transform: scale(0.98); }
  .send-btn:disabled { background: #c9a793; cursor: not-allowed; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .send-btn.loading .spinner { display: inline-block; }
  .send-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    margin-top: 28px;
    border: 1px solid var(--paper-line);
    border-radius: 8px;
    background: #FFFEFA;
    overflow: hidden;
    display: none;
  }
  .result-card.show { display: block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--paper-line);
    background: linear-gradient(to bottom, #FBF8F1, #FFFEFA);
  }
  .result-header .field-label { margin: 0; }

  .copy-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--paper-line);
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--seal-green); color: var(--seal-green); }
  .copy-btn.copied { border-color: var(--seal-green); color: var(--seal-green); }

  .result-body {
    padding: 22px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
    color: var(--ink);
  }

  .notes {
    padding: 14px 24px 20px;
    border-top: 1px dashed var(--paper-line);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .notes strong { color: var(--ink); }

  .error-box {
    margin-top: 20px;
    padding: 14px 18px;
    border: 1px solid #c0392b;
    border-radius: 6px;
    background: #fbeae7;
    color: #8b2e1e;
    font-size: 13px;
    display: none;
  }
  .error-box.show { display: block; }

  footer {
    text-align: center;
    margin-top: 56px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="stamp-mark"><span>R</span></div>
      <div>
        <h1>Refine</h1>
        <div class="tagline">turn a rough draft into a cold email worth opening</div>
      </div>
    </div>
    <div class="postmark">PAR AVION<br>NO. 001</div>
  </header>

  <div class="field-label">Your rough draft</div>
  <textarea id="draftInput" placeholder="Paste your rough cold email here. Don't worry about polish — just get the idea down.&#10;&#10;e.g. Hey, I saw your company does marketing for small businesses. I built a tool that could help you save time on client reports. Want to hop on a call sometime?"></textarea>

  <div class="controls">
    <div class="tone-group">
      <div class="field-label">Tone</div>
      <div class="tone-chips" id="toneChips">
        <div class="chip active" data-tone="Direct and confident">Direct</div>
        <div class="chip" data-tone="Warm and friendly">Friendly</div>
        <div class="chip" data-tone="Formal and professional">Formal</div>
        <div class="chip" data-tone="Founder-to-founder, casual peer tone">Founder-to-founder</div>
        <div class="chip" data-tone="Persuasive and benefit-driven, but not pushy">Persuasive</div>
      </div>
    </div>
    <button class="send-btn" id="refineBtn">
      <div class="spinner"></div>
      <span class="btn-text">Refine email →</span>
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="field-label" style="margin:0;">Refined version</div>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="notes" id="resultNotes"></div>
  </div>

  <footer>built to test one idea — does AI-refined outreach actually save you time</footer>
</div>

<script>
  let selectedTone = "Direct and confident";

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedTone = chip.dataset.tone;
    });
  });

  const btn = document.getElementById('refineBtn');
  const draftInput = document.getElementById('draftInput');
  const resultCard = document.getElementById('resultCard');
  const resultBody = document.getElementById('resultBody');
  const resultNotes = document.getElementById('resultNotes');
  const errorBox = document.getElementById('errorBox');
  const copyBtn = document.getElementById('copyBtn');

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(resultBody.textContent).then(() => {
      copyBtn.textContent = 'Copied';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
    });
  });

  btn.addEventListener('click', async () => {
    const draft = draftInput.value.trim();
    errorBox.classList.remove('show');
    if (!draft) {
      errorBox.textContent = 'Paste a draft email first — even a rough one is fine.';
      errorBox.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    resultCard.classList.remove('show');

    try {
      // Calls your own backend (api/refine.js) — it holds the API key, not this page.
      const response = await fetch("/api/refine", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ draft: draft, tone: selectedTone })
      });

      const parsed = await response.json();

      if (!response.ok) {
        throw new Error(parsed.error || "Request failed: " + response.status);
      }

      resultBody.textContent = parsed.refined_email || "(no output)";
      resultNotes.innerHTML = parsed.notes ? ("<strong>What changed: </strong>" + parsed.notes) : "";
      resultCard.classList.add('show');
    } catch (err) {
      console.error(err);
      errorBox.textContent = "Something went wrong refining that email. Please try again in a moment.";
      errorBox.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
